<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qbit Dashboard</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
height:140px;
padding:12px;
border-radius:6px;
border:none;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.primary{
background:#2563eb;
color:white;
}

.output{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:8px;
line-height:1.6;
white-space:pre-wrap;
}

.share{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.loader{
display:none;
margin-top:20px;
text-align:center;
}

.spinner{
width:40px;
height:40px;
border:4px solid #334155;
border-top:4px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<p>
Describe your daily work tasks (3–5 sentences).
</p>

<label>Experience</label>
<input id="exp" placeholder="Example: 3 years">

<label>Target Role</label>
<input id="targetRole" placeholder="Example: Data Analyst">

<label>Timeline</label>
<select id="timeline">
<option value="3 months">3 months</option>
<option value="6 months">6 months</option>
<option value="1 year">1 year</option>
</select>

<textarea id="userInput" placeholder="Example:

• I create telecom KPI reports in Excel.
• I analyze performance data and prepare dashboards.
"></textarea>

<button class="primary" onclick="runAnalysis()">Analyze My Skills</button>

<p style="opacity:0.7;font-size:13px;">Takes ~30 seconds</p>

<div class="loader" id="loader">

<div class="spinner"></div>

<div class="progress" id="progressText">
Analyzing your work tasks...
</div>

</div>

<div id="outputBox" class="output" style="display:none"></div>

<div class="share">

<button onclick="shareScore()">Copy Score</button>
<button onclick="shareWhatsapp()">WhatsApp</button>
<button onclick="shareLinkedIn()">LinkedIn</button>
<button onclick="shareFacebook()">Facebook</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxbfpLp2R1HlDLlUoweB3bl6TOCs-ZP6126OnVOt1BWpXfsaA2A-YxSckW8x3G3c1WQ/exec";

let currentScore=0;
let currentRole="";

function runAnalysis(){

let text=document.getElementById("userInput").value;

let exp=document.getElementById("exp").value;
let targetRole=document.getElementById("targetRole").value;
let timeline=document.getElementById("timeline").value;

if(text.length<10){
alert("Please describe your work activities.");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("outputBox").style.display="none";

simulateProgress();

fetch(API_URL+"?analyze=true&data="+encodeURIComponent(JSON.stringify({
text:text,
exp:exp,
targetRole:targetRole,
timeline:timeline
})))

.then(res=>{
if(!res.ok){
throw new Error("Server error");
}
return res.json();
})

.then(data=>{

currentScore=data.score;
currentRole=data.role;

let output=`

📊 Career Alignment Score
${data.score}% ready for ${data.role}

${data.percentile}

🧠 Why Qbit thinks this

Your work includes:
${data.skills.join(", ")}

⚠ Skill Gaps
${data.gaps.join(", ")}

📚 Learning Roadmap
${data.roadmap}

🚀 Improve Your Score

Improve from ${data.score}% → ${Math.min(data.score+15,100)}%

Focus on:
${data.gaps.slice(0,2).join(", ")}

`;

document.getElementById("loader").style.display="none";

document.getElementById("outputBox").innerText=output;

document.getElementById("outputBox").style.display="block";

})

.catch(err=>{
document.getElementById("loader").style.display="none";
alert("AI analysis failed.");
});

}

function simulateProgress(){

const messages=[
"Analyzing tasks...",
"Detecting skills...",
"Matching careers..."
];

let i=0;

const interval=setInterval(()=>{

document.getElementById("progressText").innerText=messages[i];

i++;

if(i>=messages.length){
clearInterval(interval);
}

},1200);

}

function shareScore(){
navigator.clipboard.writeText(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit https://tryqbit.com"
);
alert("Score copied!");
}

function shareWhatsapp(){
window.open("https://wa.me/?text="+encodeURIComponent(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit https://tryqbit.com"
));
}

function shareLinkedIn(){
window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://tryqbit.com");
}

function shareFacebook(){
window.open("https://www.facebook.com/sharer/sharer.php?u=https://tryqbit.com");
}

</script>

</body>
</html>
