<!DOCTYPE html>

<html>
<head>

<title>Qbit Career Analyzer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf.min.js"></script>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:6px;
padding:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

.progressBar{
height:18px;
background:#334155;
border-radius:8px;
overflow:hidden;
}

.progressFill{
height:100%;
background:#2563eb;
}

.card{
background:#1e293b;
padding:20px;
border-radius:8px;
margin-top:20px;
}

.loader{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<label>Name</label> <input id="name">

<label>Current Role</label> <input id="role">

<label>Experience</label> <input id="exp">

<label>Target Role</label> <input id="targetRole">

<label>Describe Work</label>

<textarea id="work"></textarea>

<p style="opacity:0.7;">Upload resume (file analyzed but not stored)</p>

<input type="file" id="resume">

<br><br>

<button onclick="run()">Analyze Career</button>

<div class="loader" id="loader">
<p id="aiStatus">Analyzing work patterns...</p>
</div>

<div id="result"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw-CN9Qoln7WeWn27Ys-vOtVKrEwgdY5GkZ5ev7vs3RHvoYXUJgrkcKbCGUom1Wn-DQ/exec";

const params=new URLSearchParams(location.search);
const session=params.get("session");

async function parsePDF(file){

const reader=new FileReader();

return new Promise(resolve=>{

reader.onload=async function(){

const typedarray=new Uint8Array(this.result);

const pdf=await pdfjsLib.getDocument(typedarray).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i);

const content=await page.getTextContent();

content.items.forEach(item=>{
text+=item.str+" ";
});

}

resolve(text);

};

reader.readAsArrayBuffer(file);

});

}

async function run(){

let text=document.getElementById("work").value;

const file=document.getElementById("resume").files[0];

if(file){

const resume=await parsePDF(file);

text=text+" "+resume;

}

document.getElementById("loader").style.display="block";

fetch(API+"?analyze=true&data="+encodeURIComponent(JSON.stringify({

session_id:session,
name:document.getElementById("name").value,
role:document.getElementById("role").value,
exp:document.getElementById("exp").value,
targetRole:document.getElementById("targetRole").value,
text:text

})))

.then(r=>r.json())
.then(d=>{

document.getElementById("loader").style.display="none";

render(d);

});

}

function render(data){

let html="";

html+=`<div class='card'>`;

html+=`<h3>${data.score}% Ready for ${data.role}</h3>`;

html+=`<div class='progressBar'><div class='progressFill' style='width:${data.score}%'></div></div>`;

html+=`<p>${data.percentile}</p>`;

html+=`</div>`;

html+=`<div class='card'><h4>Score Explanation</h4>`;

html+=`Matched Skills: ${data.skills.join(", ")}<br>`;
html+=`Missing Skills: ${data.gaps.join(", ")}`;

html+=`</div>`;

html+=`<div class='card'><h4>Weekly Career Kit</h4>`;

html+=`Practice: ${data.weekly}`;

html+=`</div>`;

html+=`<div class='card'><h4>Career Path</h4>`;

html+=data.career_path;

html+=`</div>`;

html+=`<div class='card'><h4>Salary Insight</h4>`;

html+=`Potential salary: ${data.salary}`;

html+=`</div>`;

html+=`<button onclick="roadmap()">Request Personalized Roadmap</button>`;

document.getElementById("result").innerHTML=html;

}

function roadmap(){

if(confirm("Generate personalized roadmap?")){

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"roadmap",
session:session
})
});

alert("Roadmap request received. It will be emailed soon.");

}

}

</script>

</body>
</html>
