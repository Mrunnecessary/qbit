<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qbit Career Analyzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:960px;
margin:auto;
padding:25px;
}

h2{
margin-bottom:25px;
}

/* GRID FORM */

.formGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:25px;
}

.formItem{
margin-bottom:5px;
}

.formItem label{
font-size:13px;
opacity:0.85;
display:block;
margin-bottom:6px;
}

.formItem input,
.formItem select{
width:100%;
padding:9px;
border-radius:6px;
border:none;
font-size:13px;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:6px;
border:none;
margin-top:10px;
}

.uploadBox{
margin-top:12px;
font-size:13px;
opacity:0.8;
}

button{
margin-top:22px;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.output{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
line-height:1.6;
}

.badge{
margin-top:15px;
background:#111827;
padding:10px;
border-radius:6px;
font-weight:600;
}

/* SHARE BLOCK */

.shareBlock{
margin-top:25px;
background:#0b1220;
border:1px solid #1f2937;
padding:20px;
border-radius:8px;
text-align:center;
}

.shareBlock h3{
margin-top:0;
}

canvas{
margin-top:20px;
background:white;
border-radius:8px;
}

.share{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:#1e293b;
padding:30px;
border-radius:10px;
max-width:400px;
text-align:center;
}

.popup input{
margin-top:10px;
padding:8px;
width:100%;
border:none;
border-radius:6px;
}

@media(max-width:768px){

.formGrid{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<div class="formGrid">

<div class="formItem">
<label>Current Role</label>
<input id="role">
</div>

<div class="formItem">
<label>Experience</label>
<input id="exp" type="number">
</div>

<div class="formItem">
<label>Current Salary</label>
<select id="salary">
<option>Below 5L</option>
<option>5L - 10L</option>
<option>10L - 20L</option>
<option>20L+</option>
</select>
</div>

<div class="formItem">
<label>Target Role</label>
<input id="targetRole">
</div>

<div class="formItem">
<label>Target Salary</label>
<select id="targetSalary">
<option>5L - 10L</option>
<option>10L - 20L</option>
<option>20L+</option>
</select>
</div>

<div class="formItem">
<label>Timeline</label>
<select id="timeline">
<option>3 months</option>
<option>6 months</option>
<option>12 months</option>
</select>
</div>

</div>


<label>Describe Daily Work *</label>

<textarea id="userInput" placeholder="Example:

• I create telecom KPI reports in Excel
• I monitor network performance
• I analyze data and send weekly dashboards
• I track bugs and update Jira tickets
"></textarea>


<div class="uploadBox">
Or Upload Resume (PDF):
<input type="file" id="resumeFile" accept="application/pdf">
</div>


<button class="primary" onclick="runAnalysis()">Discover My Career Score</button>


<div id="outputBox" class="output" style="display:none"></div>

<div id="percentileBadge" class="badge" style="display:none"></div>

<canvas id="shareCard" width="600" height="350" style="display:none"></canvas>


<div id="shareBlock" class="shareBlock" style="display:none">

<h3>🚀 Share your score and compare with others</h3>

<p>Post your result and see how others compare.</p>

<div class="share">

<button onclick="downloadCard()">Download Score Card</button>

<button onclick="shareLinkedIn()">LinkedIn</button>

<button onclick="shareWhatsapp()">WhatsApp</button>

<button onclick="shareFacebook()">Facebook</button>

</div>

</div>

</div>


<div class="popup" id="emailPopup">

<div class="popupBox">

<h3>Save Your Career Report</h3>

<p>Enter your email to track improvement.</p>

<input type="email" id="userEmail">

<button class="primary" onclick="saveEmail()">Save</button>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbymfvNnFnYDTk77XSl8gneLNzsYhck2ltmxiqX9CLhhBav3We3lDWbGi-YIab6tRnQ0/exec";

let currentScore=0;
let currentRole="";
let percentileText="";

async function extractTextFromPDF(file){

const reader=new FileReader();

return new Promise(resolve=>{

reader.onload=async function(){

const typedarray=new Uint8Array(this.result);

const pdf=await pdfjsLib.getDocument(typedarray).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i);
const content=await page.getTextContent();

content.items.forEach(item=>{
text+=item.str+" ";
});

}

resolve(text);

};

reader.readAsArrayBuffer(file);

});

}

function expandKeywords(text){

text=text.toLowerCase()
.replace("report","reporting")
.replace("dashboard","data visualization")
.replace("analysis","analytics")
.replace("monitor","monitoring")
.replace("manage","management");

return text;

}

async function runAnalysis(){

let description=document.getElementById("userInput").value;

const resume=document.getElementById("resumeFile").files[0];

if(resume){
description=await extractTextFromPDF(resume);
}

if(description.length<10){
alert("Please describe work or upload resume");
return;
}

description=expandKeywords(description);

let payload={

text:description,

role:document.getElementById("role").value,
exp:document.getElementById("exp").value,
salary:document.getElementById("salary").value,
targetSalary:document.getElementById("targetSalary").value,
targetRole:document.getElementById("targetRole").value,
timeline:document.getElementById("timeline").value,

source:"dashboard",
device:navigator.userAgent

};

fetch(API_URL+"?analyze=true&data="+encodeURIComponent(JSON.stringify(payload)))

.then(res=>res.json())

.then(data=>{

currentScore=data.score;
currentRole=data.role;
percentileText=data.percentile;

let output=`

📊 Career Alignment Score
${data.score}% ready for ${data.role}

${data.percentile}

Detected Skills
${data.skills.join(", ")}

Skill Gaps
${data.gaps.join(", ")}

Learning Roadmap
${data.roadmap}

`;

document.getElementById("outputBox").innerText=output;
document.getElementById("outputBox").style.display="block";

document.getElementById("percentileBadge").innerText="🏆 "+percentileText;
document.getElementById("percentileBadge").style.display="block";

generateCard(data);

document.getElementById("shareBlock").style.display="block";

setTimeout(()=>{
document.getElementById("emailPopup").style.display="flex";
},3000);

});

}

function generateCard(data){

const canvas=document.getElementById("shareCard");
const ctx=canvas.getContext("2d");

canvas.style.display="block";

ctx.fillStyle="#fff";
ctx.fillRect(0,0,600,350);

ctx.fillStyle="#000";

ctx.font="26px Arial";
ctx.fillText("Qbit Career Readiness",20,50);

ctx.font="20px Arial";
ctx.fillText(data.score+"% Ready for "+data.role,20,100);

ctx.font="16px Arial";
ctx.fillText(percentileText,20,150);

ctx.fillText("tryqbit.com",20,300);

}

function downloadCard(){

let canvas=document.getElementById("shareCard");

let link=document.createElement("a");

link.download="qbit-score.png";
link.href=canvas.toDataURL();
link.click();

}

function shareLinkedIn(){

window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://tryqbit.com");

}

function shareWhatsapp(){

window.open("https://wa.me/?text="+encodeURIComponent(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit "+percentileText+" https://tryqbit.com"
));

}

function shareFacebook(){

window.open("https://www.facebook.com/sharer/sharer.php?u=https://tryqbit.com");

}

function saveEmail(){

let email=document.getElementById("userEmail").value;

fetch(API_URL,{
method:"POST",
body:new URLSearchParams({
email:email,
source:"dashboard",
device:navigator.userAgent
})
})

.then(()=>{
alert("Saved");
document.getElementById("emailPopup").style.display="none";
});

}

</script>

</body>
</html>
