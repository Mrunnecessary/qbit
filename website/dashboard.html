<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qbit Career Analyzer</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:960px;
margin:auto;
padding:25px;
}

.formGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:25px;
}

.formItem label{
font-size:13px;
display:block;
margin-bottom:6px;
}

.formItem input,
.formItem select{
width:100%;
padding:9px;
border-radius:6px;
border:none;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:6px;
border:none;
}

button{
margin-top:20px;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.loader{
display:none;
text-align:center;
margin-top:20px;
}

.spinner{
width:40px;
height:40px;
border:4px solid #334155;
border-top:4px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.output{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
}

.shareBlock{
display:none;
margin-top:25px;
text-align:center;
}

.share{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

canvas{
margin-top:20px;
background:white;
border-radius:8px;
display:none;
}

footer{
margin-top:60px;
text-align:center;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<div class="formGrid">

<div class="formItem">
<label>Name</label>
<input id="name">
</div>

<div class="formItem">
<label>Current Role</label>
<input id="role">
</div>

<div class="formItem">
<label>Experience</label>
<input id="exp">
</div>

<div class="formItem">
<label>Current Salary</label>
<select id="salary">
<option>Below 5L</option>
<option>5L - 10L</option>
<option>10L - 20L</option>
<option>20L+</option>
</select>
</div>

<div class="formItem">
<label>Target Role</label>
<input id="targetRole">
</div>

<div class="formItem">
<label>Timeline</label>
<select id="timeline">
<option>3 months</option>
<option>6 months</option>
<option>12 months</option>
</select>
</div>

</div>

<label>Describe Daily Work *</label>

<textarea id="userInput"></textarea>

<button class="primary" onclick="runAnalysis()">Discover My Career Score</button>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<div id="outputBox" class="output" style="display:none"></div>

<canvas id="shareCard" width="600" height="350"></canvas>

<div id="shareBlock" class="shareBlock">

<h3>Share your score</h3>

<div class="share">

<button onclick="downloadCard()">Download Score Card</button>

<button onclick="shareLinkedIn()">LinkedIn</button>

<button onclick="shareWhatsapp()">WhatsApp</button>

<button onclick="shareFacebook()">Facebook</button>

</div>

</div>

</div>

<footer>

© 2026 Qbit — Career Intelligence Platform  
hello@tryqbit.com

</footer>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzv-KBrRXHh3zFzF061k8gEkb4HzbK-9LD2f4vqJm4gQ6Gxh-bKVbl9W4X7dsVlscA8/exec";

let shareText="";

function runAnalysis(){

let text=document.getElementById("userInput").value;

if(text.length<10){
alert("Please describe your work tasks.");
return;
}

document.getElementById("loader").style.display="block";

let payload={

name:document.getElementById("name").value,
text:text,
role:document.getElementById("role").value,
exp:document.getElementById("exp").value,
salary:document.getElementById("salary").value,
targetRole:document.getElementById("targetRole").value,
timeline:document.getElementById("timeline").value,
source:"dashboard"

};

fetch(API_URL+"?analyze=true&data="+encodeURIComponent(JSON.stringify(payload)))

.then(res=>res.json())

.then(data=>{

document.getElementById("loader").style.display="none";

let output=`

Career Alignment Score
${data.score}% ready for ${data.role}

${data.percentile}

Detected Skills
${data.skills.join(", ")}

Skill Gaps
${data.gaps.join(", ")}

Learning Roadmap
${data.roadmap}
`;

document.getElementById("outputBox").innerText=output;
document.getElementById("outputBox").style.display="block";

shareText=`I am ${data.score}% ready for ${data.role} according to Qbit.

${data.percentile}

Check your score:
https://tryqbit.com`;

generateCard(data);

document.getElementById("shareBlock").style.display="block";

});

}

function generateCard(data){

const canvas=document.getElementById("shareCard");
const ctx=canvas.getContext("2d");

canvas.style.display="block";

const name=document.getElementById("name").value || "User";

ctx.fillStyle="#fff";
ctx.fillRect(0,0,600,350);

ctx.fillStyle="#000";

ctx.font="26px Arial";
ctx.fillText("Qbit Career Readiness",20,50);

ctx.font="20px Arial";
ctx.fillText(name+"'s Career Score",20,100);

ctx.fillText(data.score+"% Ready for "+data.role,20,140);

ctx.fillText("tryqbit.com",20,300);

}

function downloadCard(){

let canvas=document.getElementById("shareCard");

let link=document.createElement("a");

link.download="qbit-score.png";

link.href=canvas.toDataURL();

link.click();

}

function shareLinkedIn(){
window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://tryqbit.com");
}

function shareWhatsapp(){
window.open("https://wa.me/?text="+encodeURIComponent(shareText));
}

function shareFacebook(){
window.open("https://www.facebook.com/sharer/sharer.php?u=https://tryqbit.com&quote="+encodeURIComponent(shareText));
}

</script>

</body>
</html>
