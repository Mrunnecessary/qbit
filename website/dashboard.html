<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qbit Career Analyzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:960px;
margin:auto;
padding:25px;
}

.formGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:25px;
}

.formItem label{
font-size:13px;
opacity:0.85;
display:block;
margin-bottom:6px;
}

.formItem input,
.formItem select{
width:100%;
padding:9px;
border-radius:6px;
border:none;
font-size:13px;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
margin-top:20px;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

/* LOADER */

.loader{
display:none;
margin-top:25px;
text-align:center;
}

.spinner{
width:40px;
height:40px;
border:4px solid #334155;
border-top:4px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress{
margin-top:10px;
opacity:0.8;
font-size:14px;
}

/* OUTPUT */

.output{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
line-height:1.6;
}

/* SHARE */

.shareBlock{
margin-top:25px;
background:#0b1220;
border:1px solid #1f2937;
padding:20px;
border-radius:8px;
text-align:center;
display:none;
}

.share{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

canvas{
margin-top:20px;
background:white;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<div class="formGrid">

<div class="formItem">
<label>Current Role</label>
<input id="role">
</div>

<div class="formItem">
<label>Experience</label>
<input id="exp">
</div>

<div class="formItem">
<label>Current Salary</label>
<select id="salary">
<option>Below 5L</option>
<option>5L - 10L</option>
<option>10L - 20L</option>
<option>20L+</option>
</select>
</div>

<div class="formItem">
<label>Target Role</label>
<input id="targetRole">
</div>

<div class="formItem">
<label>Target Salary</label>
<select id="targetSalary">
<option>5L - 10L</option>
<option>10L - 20L</option>
<option>20L+</option>
</select>
</div>

<div class="formItem">
<label>Timeline</label>
<select id="timeline">
<option>3 months</option>
<option>6 months</option>
<option>12 months</option>
</select>
</div>

</div>

<label>Describe Daily Work *</label>

<textarea id="userInput" placeholder="Example:

• I monitor telecom KPI reports in Excel
• I manage field engineers
• I analyze network performance
"></textarea>

<p style="font-size:13px;opacity:0.7">
Or Upload Resume (PDF)
</p>

<input type="file" id="resumeFile" accept="application/pdf">

<button class="primary" onclick="runAnalysis()">Discover My Career Score</button>


<div class="loader" id="loader">

<div class="spinner"></div>

<div class="progress" id="progressText">
Analyzing your work tasks...
</div>

</div>


<div id="outputBox" class="output" style="display:none"></div>


<canvas id="shareCard" width="600" height="350"></canvas>


<div id="shareBlock" class="shareBlock">

<h3>🚀 Share your score and compare with others</h3>

<div class="share">

<button onclick="downloadCard()">Download Score Card</button>

<button onclick="shareLinkedIn()">LinkedIn</button>

<button onclick="shareWhatsapp()">WhatsApp</button>

<button onclick="shareFacebook()">Facebook</button>

</div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxx9f7-DeHyXbOIstt5PSPF4WENJKCCFeI9eehS72ZlrOXrxItDddlH166bmvGVA4Q_/exec";

let currentScore=0;
let currentRole="";

/* LOADER ANIMATION */

function simulateProgress(){

const messages=[
"Analyzing your work tasks...",
"Detecting transferable skills...",
"Comparing career roles...",
"Calculating readiness score..."
];

let i=0;

const interval=setInterval(()=>{

document.getElementById("progressText").innerText=messages[i];

i++;

if(i>=messages.length){
clearInterval(interval);
}

},1200);

}


/* ANALYSIS */

async function runAnalysis(){

let text=document.getElementById("userInput").value;

if(text.length<10){
alert("Please describe your work tasks.");
return;
}

document.getElementById("loader").style.display="block";

simulateProgress();

let payload={

text:text,
role:document.getElementById("role").value,
exp:document.getElementById("exp").value,
salary:document.getElementById("salary").value,
targetSalary:document.getElementById("targetSalary").value,
targetRole:document.getElementById("targetRole").value,
timeline:document.getElementById("timeline").value,

source:"dashboard",
device:navigator.userAgent

};

fetch(API_URL+"?analyze=true&data="+encodeURIComponent(JSON.stringify(payload)))

.then(res=>res.json())

.then(data=>{

document.getElementById("loader").style.display="none";

currentScore=data.score;
currentRole=data.role;

let output=`

Career Alignment Score
${data.score}% ready for ${data.role}

${data.percentile}

Detected Skills
${data.skills.join(", ")}

Skill Gaps
${data.gaps.join(", ")}

Learning Roadmap
${data.roadmap}

`;

document.getElementById("outputBox").innerText=output;
document.getElementById("outputBox").style.display="block";

generateCard(data);

document.getElementById("shareBlock").style.display="block";

});

}


/* SCORE CARD */

function generateCard(data){

const canvas=document.getElementById("shareCard");
const ctx=canvas.getContext("2d");

canvas.style.display="block";

ctx.fillStyle="#fff";
ctx.fillRect(0,0,600,350);

ctx.fillStyle="#000";

ctx.font="26px Arial";
ctx.fillText("Qbit Career Readiness",20,50);

ctx.font="20px Arial";
ctx.fillText(data.score+"% Ready for "+data.role,20,100);

ctx.font="16px Arial";
ctx.fillText("tryqbit.com",20,300);

}


/* SHARE */

function downloadCard(){

let canvas=document.getElementById("shareCard");

let link=document.createElement("a");

link.download="qbit-score.png";

link.href=canvas.toDataURL();

link.click();

}

function shareLinkedIn(){

window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://tryqbit.com");

}

function shareWhatsapp(){

window.open("https://wa.me/?text="+encodeURIComponent(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit https://tryqbit.com"
));

}

function shareFacebook(){

window.open("https://www.facebook.com/sharer/sharer.php?u=https://tryqbit.com");

}

</script>

</body>
</html>
