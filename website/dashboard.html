<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qbit Skill Analyzer</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
height:140px;
padding:12px;
border-radius:6px;
border:none;
font-size:14px;
}

button{
margin-top:10px;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.primary{
background:#2563eb;
color:white;
}

.output{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:8px;
line-height:1.6;
white-space:pre-wrap;
}

.share{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

canvas{
margin-top:20px;
background:white;
border-radius:8px;
}

/* percentile badge */

.badge{
margin-top:10px;
background:#111827;
padding:10px;
border-radius:6px;
font-weight:600;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:#1e293b;
padding:30px;
border-radius:10px;
max-width:400px;
text-align:center;
}

.popup input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<p>
Describe your daily work tasks (3–5 sentences).
</p>

<textarea id="userInput"></textarea>

<button class="primary" onclick="runAnalysis()">Analyze My Skills</button>

<div id="outputBox" class="output" style="display:none"></div>

<div id="percentileBadge" class="badge" style="display:none"></div>

<canvas id="shareCard" width="600" height="350" style="display:none"></canvas>

<div class="share">

<p style="width:100%;opacity:0.8">
Share your score on LinkedIn to compare with others.
</p>

<button onclick="downloadCard()">Download Score Card</button>

<button onclick="shareLinkedIn()">Share LinkedIn</button>

<button onclick="shareWhatsapp()">Share WhatsApp</button>

</div>

</div>

<!-- EMAIL POPUP -->

<div class="popup" id="emailPopup">

<div class="popupBox">

<h3>Save Your Career Report</h3>

<p>
Enter your email to track improvement and receive your roadmap.
</p>

<input type="email" id="userEmail" placeholder="Enter email">

<button class="primary" onclick="saveEmail()">Save Report</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzLdbgqL12ebllcBKrHXDfCWKzWi9Za37z8C9o_cFkg6x9-rjRnJqhjrA9jTSsFmJsa/exec";

let currentScore=0;
let currentRole="";
let percentileText="";

function runAnalysis(){

let text=document.getElementById("userInput").value;

if(text.length<10){
alert("Please describe your work tasks.");
return;
}

fetch(API_URL+"?analyze=true&data="+encodeURIComponent(JSON.stringify({text:text})))

.then(res=>res.json())

.then(data=>{

currentScore=data.score;
currentRole=data.role;
percentileText=data.percentile;

/* result */

let output=`

📊 Career Alignment Score
${data.score}% ready for ${data.role}

Based on your work description and detected transferable skills.

🧠 Why Qbit thinks this

Your work includes:
${data.skills.join(", ")}

These skills commonly appear in ${data.role} roles.

⚠ Skill Gaps
${data.gaps.join(", ")}

📚 Learning Roadmap
${data.roadmap}

Improve your score from ${data.score}% → ${Math.min(data.score+15,100)}
by learning ${data.gaps.slice(0,2).join(", ")}

`;

document.getElementById("outputBox").innerText=output;
document.getElementById("outputBox").style.display="block";

/* percentile badge */

document.getElementById("percentileBadge").innerText="🏆 "+percentileText;
document.getElementById("percentileBadge").style.display="block";

generateCard(data);

/* popup after few seconds */

setTimeout(()=>{
document.getElementById("emailPopup").style.display="flex";
},3000);

});

}

function generateCard(data){

const canvas=document.getElementById("shareCard");
const ctx=canvas.getContext("2d");

canvas.style.display="block";

ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,600,350);

ctx.fillStyle="#000";

ctx.font="26px Arial";
ctx.fillText("Qbit Career Readiness",20,50);

ctx.font="20px Arial";
ctx.fillText(data.score+"% Ready for "+data.role,20,100);

ctx.font="16px Arial";

ctx.fillText("Top percentile:",20,140);
ctx.fillText(percentileText,20,170);

ctx.fillText("Skills: "+data.skills.slice(0,3).join(", "),20,220);

ctx.fillText("Skill Gaps: "+data.gaps.slice(0,3).join(", "),20,250);

ctx.fillText("tryqbit.com",20,310);

}

function downloadCard(){

let canvas=document.getElementById("shareCard");

let link=document.createElement('a');

link.download="qbit-career-score.png";

link.href=canvas.toDataURL();

link.click();

}

function shareLinkedIn(){

window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://tryqbit.com");

}

function shareWhatsapp(){

window.open("https://wa.me/?text="+encodeURIComponent(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit. "+percentileText+" https://tryqbit.com"
));

}

function saveEmail(){

let email=document.getElementById("userEmail").value;

fetch(API_URL,{
method:"POST",
body:new URLSearchParams({
email:email,
source:"dashboard",
device:navigator.userAgent
})
})

.then(()=>{
alert("Report saved!");
document.getElementById("emailPopup").style.display="none";
});

}

</script>

</body>
</html>
