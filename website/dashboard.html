<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qbit Dashboard</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h2{
margin-bottom:5px;
}

.subtitle{
opacity:0.8;
margin-bottom:20px;
}

textarea{
width:100%;
height:140px;
padding:12px;
border-radius:6px;
border:none;
font-size:14px;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.primary{
background:#2563eb;
color:white;
}

.output{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
line-height:1.6;
}

.share{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

</style>

</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<p class="subtitle">
Describe what you do daily at work. Qbit will detect your hidden skills.
</p>

<textarea id="userInput" placeholder="Example: I create telecom KPI reports in Excel and prepare weekly dashboards for management."></textarea>

<button class="primary" onclick="runAnalysis()">Analyze My Skills</button>

<div id="outputBox" class="output" style="display:none"></div>

<div class="share">

<button onclick="shareScore()">Copy Score</button>
<button onclick="shareWhatsapp()">WhatsApp</button>
<button onclick="shareLinkedIn()">LinkedIn</button>
<button onclick="shareFacebook()">Facebook</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxVP1KmR_a0k7w9Eh7WIOnbB0eiF52JxuvGdSgqYItVl77YtYF8NEHXbXCrwUFpfADp/exec";

let currentScore=0;
let currentRole="";

function runAnalysis(){

let text=document.getElementById("userInput").value;

if(text.length<10){
alert("Please describe your work activities.");
return;
}

fetch(API_URL+"?analyze=true&data="+encodeURIComponent(JSON.stringify({text:text})))

.then(res=>res.json())

.then(data=>{

currentScore=data.score;
currentRole=data.role;

let output=`

Career Alignment Score
${data.score}% ready for ${data.role}

${data.percentile}

Why Qbit thinks this

Your work includes:
${data.skills.join(", ")}

These skills are commonly used in ${data.role} roles.

Skill Gaps
${data.gaps.join(", ")}

Learning Roadmap
${data.roadmap}

Recommended Free Resources

SQL Course
https://www.freecodecamp.org/learn/relational-database/

Python Course
https://www.kaggle.com/learn/python

Statistics
https://www.khanacademy.org/math/statistics-probability

Improve Your Score

Improve your score from ${data.score}% → ${Math.min(data.score+15,100)}% by learning:

${data.gaps.slice(0,2).join(", ")}

Recheck your score after completing one roadmap step.

`;

document.getElementById("outputBox").innerText=output;
document.getElementById("outputBox").style.display="block";

});

}

function shareScore(){
navigator.clipboard.writeText(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit https://tryqbit.com"
);
alert("Score copied!");
}

function shareWhatsapp(){
window.open("https://wa.me/?text="+encodeURIComponent(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit https://tryqbit.com"
));
}

function shareLinkedIn(){
window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://tryqbit.com");
}

function shareFacebook(){
window.open("https://www.facebook.com/sharer/sharer.php?u=https://tryqbit.com");
}

</script>

</body>
</html>
