<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qbit Career Analyzer</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

label{
display:block;
margin-top:15px;
font-size:14px;
opacity:0.9;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:5px;
}

textarea{
height:120px;
}

button{
margin-top:20px;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.output{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
}

.badge{
margin-top:15px;
background:#111827;
padding:10px;
border-radius:6px;
font-weight:600;
}

canvas{
margin-top:20px;
background:white;
border-radius:8px;
}

.share{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:#1e293b;
padding:30px;
border-radius:10px;
max-width:400px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>Career Readiness Analyzer</h2>

<label>Current Role</label>
<input id="role">

<label>Years of Experience</label>
<input id="exp">

<label>Current Salary Range</label>
<select id="salary">
<option>Below 5L</option>
<option>5L - 10L</option>
<option>10L - 20L</option>
<option>20L+</option>
</select>

<label>Target Role</label>
<input id="targetRole">

<label>Target Salary</label>
<select id="targetSalary">
<option>5L - 10L</option>
<option>10L - 20L</option>
<option>20L+</option>
</select>

<label>Timeline for Career Switch</label>
<select id="timeline">
<option>3 months</option>
<option>6 months</option>
<option>12 months</option>
</select>

<label>Describe your daily work</label>
<textarea id="userInput"></textarea>

<button class="primary" onclick="runAnalysis()">Analyze My Skills</button>

<div id="outputBox" class="output" style="display:none"></div>

<div id="percentileBadge" class="badge" style="display:none"></div>

<canvas id="shareCard" width="600" height="350" style="display:none"></canvas>

<div class="share">

<p style="width:100%">
Share your score on LinkedIn to compare with others.
</p>

<button onclick="downloadCard()">Download Score Card</button>
<button onclick="shareLinkedIn()">Share LinkedIn</button>
<button onclick="shareWhatsapp()">Share WhatsApp</button>

</div>

</div>

<div class="popup" id="emailPopup">

<div class="popupBox">

<h3>Save Your Career Report</h3>

<p>Enter your email to track improvement.</p>

<input type="email" id="userEmail">

<button class="primary" onclick="saveEmail()">Save</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzLdbgqL12ebllcBKrHXDfCWKzWi9Za37z8C9o_cFkg6x9-rjRnJqhjrA9jTSsFmJsa/exec";

let currentScore=0;
let currentRole="";
let percentileText="";

function expandKeywords(text){

text=text.toLowerCase()

.replace("report","reporting")
.replace("dashboard","data visualization")
.replace("analysis","analytics")
.replace("monitor","monitoring")
.replace("manage","management")

return text

}

function runAnalysis(){

let description=document.getElementById("userInput").value

if(description.length<10){

alert("Please describe your work tasks.")
return

}

description=expandKeywords(description)

let payload={

text:description,

role:document.getElementById("role").value,
exp:document.getElementById("exp").value,
salary:document.getElementById("salary").value,
targetSalary:document.getElementById("targetSalary").value,
targetRole:document.getElementById("targetRole").value,
timeline:document.getElementById("timeline").value,

source:"dashboard",
device:navigator.userAgent

}

fetch(API_URL+"?analyze=true&data="+encodeURIComponent(JSON.stringify(payload)))

.then(res=>res.json())

.then(data=>{

currentScore=data.score
currentRole=data.role
percentileText=data.percentile

let output=`

📊 Career Alignment Score
${data.score}% ready for ${data.role}

Based on your work description and detected transferable skills.

${data.percentile}

🧠 Why Qbit thinks this

Your work includes:
${data.skills.join(", ")}

These skills commonly appear in ${data.role} roles.

⚠ Skill Gaps
${data.gaps.join(", ")}

📚 Learning Roadmap
${data.roadmap}

`

document.getElementById("outputBox").innerText=output
document.getElementById("outputBox").style.display="block"

document.getElementById("percentileBadge").innerText="🏆 "+percentileText
document.getElementById("percentileBadge").style.display="block"

generateCard(data)

setTimeout(()=>{

document.getElementById("emailPopup").style.display="flex"

},3000)

})

}

function generateCard(data){

const canvas=document.getElementById("shareCard")
const ctx=canvas.getContext("2d")

canvas.style.display="block"

ctx.fillStyle="#fff"
ctx.fillRect(0,0,600,350)

ctx.fillStyle="#000"

ctx.font="26px Arial"
ctx.fillText("Qbit Career Readiness",20,50)

ctx.font="20px Arial"
ctx.fillText(data.score+"% Ready for "+data.role,20,100)

ctx.font="16px Arial"
ctx.fillText(percentileText,20,150)

ctx.fillText("Skills: "+data.skills.slice(0,3).join(", "),20,200)

ctx.fillText("tryqbit.com",20,300)

}

function downloadCard(){

let canvas=document.getElementById("shareCard")

let link=document.createElement("a")

link.download="qbit-score.png"

link.href=canvas.toDataURL()

link.click()

}

function shareLinkedIn(){

window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://tryqbit.com")

}

function shareWhatsapp(){

window.open("https://wa.me/?text="+encodeURIComponent(
"I'm "+currentScore+"% ready for "+currentRole+" according to Qbit "+percentileText+" https://tryqbit.com"
))

}

function saveEmail(){

let email=document.getElementById("userEmail").value

fetch(API_URL,{
method:"POST",
body:new URLSearchParams({
email:email,
source:"dashboard",
device:navigator.userAgent
})
})

.then(()=>{
alert("Saved")
document.getElementById("emailPopup").style.display="none"
})

}

</script>

</body>
</html>
